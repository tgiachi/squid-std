name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SquidStd.slnx

      - name: Build
        run: dotnet build SquidStd.slnx -c Release --no-restore

      - name: Authenticate to Docker Hub (Testcontainers image pulls)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "No Docker Hub credentials configured; using anonymous pulls."
            exit 0
          fi
          mkdir -p "$HOME/.docker"
          AUTH="$(printf '%s:%s' "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" | base64 -w0)"
          cat > "$HOME/.docker/config.json" <<EOF
          { "auths": { "https://index.docker.io/v1/": { "auth": "${AUTH}" } } }
          EOF
          echo "Docker Hub auth configured for ${DOCKERHUB_USERNAME}."

      - name: Test
        run: >
          dotnet test SquidStd.slnx -c Release --no-build --nologo
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Generate test badge JSON
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          TRX_FILE="$(find . -type f -name 'test-results.trx' | head -n 1)"
          if [ -z "${TRX_FILE}" ]; then
            echo "No test-results.trx found"; exit 1
          fi
          COUNTERS_LINE="$(grep -m1 -o '<Counters[^>]*/>' "${TRX_FILE}")"
          TOTAL="$(echo "${COUNTERS_LINE}" | sed -n 's/.* total="\([0-9]\+\)".*/\1/p')"
          PASSED="$(echo "${COUNTERS_LINE}" | sed -n 's/.* passed="\([0-9]\+\)".*/\1/p')"
          FAILED="$(echo "${COUNTERS_LINE}" | sed -n 's/.* failed="\([0-9]\+\)".*/\1/p')"
          if [ -z "${TOTAL}" ] || [ -z "${PASSED}" ] || [ -z "${FAILED}" ]; then
            echo "Unable to parse counters from ${TRX_FILE}"; exit 1
          fi
          COLOR="brightgreen"
          if [ "${FAILED}" -gt 0 ]; then COLOR="red"; fi
          mkdir -p badges
          cat > badges/tests.json <<EOF
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "${PASSED}/${TOTAL} passing",
            "color": "${COLOR}"
          }
          EOF

      - name: Generate coverage badge JSON
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          COV_FILE="$(find . -type f -name 'coverage.cobertura.xml' | head -n 1)"
          if [ -z "${COV_FILE}" ]; then
            echo "No coverage.cobertura.xml found"; exit 1
          fi
          RATE="$(grep -m1 -o 'line-rate="[0-9.]*"' "${COV_FILE}" | sed -n 's/line-rate="\([0-9.]*\)"/\1/p')"
          PCT="$(awk -v r="${RATE}" 'BEGIN { printf "%d", (r*100)+0.5 }')"
          COLOR="brightgreen"
          if [ "${PCT}" -lt 50 ]; then COLOR="red";
          elif [ "${PCT}" -lt 80 ]; then COLOR="yellow"; fi
          mkdir -p badges
          cat > badges/coverage.json <<EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${PCT}%",
            "color": "${COLOR}"
          }
          EOF

      - name: Publish badges to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./badges
          destination_dir: badges
          keep_files: true

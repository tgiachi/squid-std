name: NuGet Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    defaults:
      run:
        shell: bash

    env:
      NUGET_SOURCE: https://api.nuget.org/v3/index.json
      NUGET_KEY: ${{ secrets.NUGET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Validate NuGet key
        run: |
          set -euo pipefail
          if [[ -z "${NUGET_KEY}" ]]; then
            echo "Missing required secret NUGET_KEY"; exit 1
          fi

      - name: Restore
        run: dotnet restore SquidStd.slnx

      - name: Build
        run: dotnet build SquidStd.slnx -c Release --no-restore

      - name: Pack publishable packages
        run: |
          set -euo pipefail
          # Discover every project opted-in with <PublishNuget>true</PublishNuget>.
          mapfile -t packages < <(grep -ril --include='*.csproj' '<PublishNuget>true</PublishNuget>' src | sort)
          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No project has <PublishNuget>true</PublishNuget>"; exit 1
          fi
          for project in "${packages[@]}"; do
            echo "Packing ${project}"
            dotnet pack "${project}" -c Release --no-build
          done

      - name: Publish packages
        run: |
          set -euo pipefail
          mapfile -t packages < <(find src -path '*/bin/Release/*.nupkg' ! -name '*.snupkg' | sort)
          mapfile -t symbols  < <(find src -path '*/bin/Release/*.snupkg' | sort)
          for package in "${packages[@]}"; do
            echo "Publishing ${package}"
            dotnet nuget push "${package}" --api-key "${NUGET_KEY}" --source "${NUGET_SOURCE}" --skip-duplicate
          done
          for symbol in "${symbols[@]}"; do
            echo "Publishing ${symbol}"
            dotnet nuget push "${symbol}" --api-key "${NUGET_KEY}" --source "${NUGET_SOURCE}" --skip-duplicate
          done

name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install git
        run: |
          apt-get update
          apt-get install -y git

      - name: Configure git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure authenticated remote for release push
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "Missing required secret RELEASE_PAT"; exit 1
          fi
          git -C "$GITHUB_WORKSPACE" remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          npx -y \
            -p semantic-release \
            -p @semantic-release/changelog \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p @semantic-release/git \
            -p @semantic-release/github \
            -p @semantic-release/exec \
            -p conventional-changelog-conventionalcommits \
            semantic-release
